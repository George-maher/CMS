services:

  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: church_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: church_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - church_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENV:-development}
    container_name: church_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: church_management
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SSLMODE: disable

      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_PASSWORD: ${RESEND_API_KEY:-}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-smtp.resend.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-resend}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@churchmanager.app}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Church Management System}

      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_URL: ${SUPABASE_STORAGE_URL:-}

    networks:
      - church_network
    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q php-fpm || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"


  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: church_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8000}:80"
      - "${NGINX_SSL_PORT:-8443}:443"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - church_network

    depends_on:
      app:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 5s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"


  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENV:-development}
    container_name: church_worker
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work database --sleep=3 --tries=3 --backoff=60 --timeout=90
    volumes:
      - ./backend:/var/www
      - /var/www/vendor

    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: church_management
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SSLMODE: disable

      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_PASSWORD: ${RESEND_API_KEY:-}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-smtp.resend.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-resend}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@churchmanager.app}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Church Management System}

      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_URL: ${SUPABASE_STORAGE_URL:-}

    networks:
      - church_network

    depends_on:
      postgres:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"


  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${APP_ENV:-development}
    container_name: church_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www
      - /var/www/vendor

    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: church_management
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SSLMODE: disable

      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_PASSWORD: ${RESEND_API_KEY:-}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-smtp.resend.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-resend}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@churchmanager.app}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Church Management System}

    networks:
      - church_network

    depends_on:
      postgres:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.3"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${APP_ENV:-development}
    container_name: church_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    environment:
      - VITE_API_PROXY=http://nginx
      - VITE_APP_NAME=ChurchManager

    volumes:
      - ./frontend:/app
      - /app/node_modules

    networks:
      - church_network

    depends_on:
      nginx:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"


volumes:
  postgres_data:

networks:
  church_network:
    driver: bridge
